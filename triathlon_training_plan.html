<html lang="en">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #2d3748;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .race-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .race-stat {
            text-align: center;
        }
        
        .race-stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #48bb78;
        }
        
        .race-stat-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Overall Summary */
        .overall-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
        }
        
        .summary-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 20px;
        }
        
        .summary-card {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        .summary-discipline {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .summary-distance {
            font-size: 2em;
            font-weight: bold;
        }
        
        .summary-time {
            font-size: 1.2em;
            margin-top: 5px;
        }
        
        .summary-totals {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            font-size: 1.1em;
        }
        
        /* Week Sections */
        .week-section {
            margin-bottom: 20px;
        }
        
        .week-header {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            padding: 15px 20px;
            font-size: 1.3em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        
        .week-header:hover {
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
        }
        
        .week-header.completed {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        
        .week-header.completed:hover {
            background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);
        }
        
        .collapse-icon {
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        
        .collapse-icon.collapsed {
            transform: rotate(-90deg);
        }
        
        .week-content {
            max-height: 5000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .week-content.collapsed {
            max-height: 50px; /* Compact summary when collapsed */
        }
        
        /* Compact summary for collapsed weeks */
        .week-metrics-compact {
            padding: 12px 20px;
            background: white;
            display: none; /* Hidden by default */
            font-size: 0.95em;
            color: #2d3748;
        }
        
        .week-metrics-compact.completed-bg {
            background: #f0fff4;
        }
        
        .week-content.collapsed .week-metrics-compact {
            display: flex; /* Show when collapsed */
            justify-content: space-between;
            align-items: center;
        }
        
        .week-content.collapsed .week-metrics {
            display: none; /* Hide full metrics when collapsed */
        }
        
        .compact-metric {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .compact-metric-value {
            font-weight: 600;
        }
        
        .compact-swim { color: #3182ce; }
        .compact-bike { color: #38a169; }
        .compact-run { color: #e53e3e; }
        .compact-total { color: #2d3748; }
        
        /* Metrics Summary */
        .week-metrics {
            padding: 20px;
            background: white;
        }
        
        .week-metrics.completed-bg {
            background: #f0fff4; /* Light green background for completed weeks */
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .metric-card {
            text-align: center;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .metric-label {
            font-size: 0.85em;
            color: #718096;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 1.6em;
            font-weight: bold;
        }
        
        .metric-value.swim { color: #3182ce; }
        .metric-value.bike { color: #38a169; }
        .metric-value.run { color: #e53e3e; }
        
        .metric-subvalue {
            font-size: 1.1em;
            margin-top: 4px;
            color: #4a5568;
        }
        
        .metrics-total {
            text-align: center;
            padding: 10px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 1.05em;
            color: #2d3748;
        }

            margin: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #e2e8f0;
        }
        
        .day.completed {
            background: #c6f6d5;
            border-left: 4px solid #38a169;
        }
        
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .day-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #2d3748;
        }
        
        .day-type {

            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .day-type.bike { background: #c6f6d5; color: #22543d; }
        .day-type.run { background: #fed7d7; color: #742a2a; }
        .day-type.brick { background: #feebc8; color: #7c2d12; }
        .day-type.climbing { background: #fef5e7; color: #744210; }
        .day-type.rest { background: #e2e8f0; color: #2d3748; }
        
        .session-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .session-details {
            color: #4a5568;
            line-height: 1.6;
        }
        
        .notes {
            margin-top: 10px;
            padding: 10px;
            background: #f7fafc;
            border-left: 3px solid #4299e1;
            font-style: italic;
            color: #2d3748;
        }
        
        /* Splits */
        .splits-toggle {
            display: inline-block;
            padding: 6px 12px;
            background: #4299e1;
            color: white;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
            user-select: none;
            margin-top: 10px;
        }
        
        .splits-toggle:hover {
            background: #3182ce;
        }
        
        .splits-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        
        .splits-content.expanded {
            max-height: 2000px;
        }
        
        .splits-table {
            margin-top: 15px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        
        .splits-table th {
            background: #e2e8f0;
            padding: 8px;
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            border-bottom: 2px solid #cbd5e0;
        }
        
        .splits-table td {

            border-bottom: 1px solid #e2e8f0;
        }
        
        .splits-table tr:hover {
            background: #f7fafc;
        }

            color: #718096;
            font-weight: 600;
        }
        
        .split-time {
            color: #2d3748;
            font-family: monospace;
        }
        
        .split-hr {
            color: #e53e3e;
            font-weight: 600;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 4px;
            margin-top: 10px;
        }

            background: #e2e8f0;
            padding: 4px;
            text-align: center;
            font-size: 0.85em;
            border-radius: 3px;
            font-family: monospace;

            .summary-grid, .metrics-grid {

                gap: 8px;

                gap: 4px;
                min-width: 45%;
            }

                width: 100%;
                justify-content: center;
                border-top: 1px solid rgba(0,0,0,0.1);
                padding-top: 8px;
                margin-top: 4px;
            }

                max-height: 90px; /* More height for wrapped content on mobile */

        // Calculate metrics for a week
        function calculateWeekMetrics(week) {
            let swimDist = 0, swimTime = 0;
            let bikeDist = 0, bikeTime = 0;
            let runDist = 0, runTime = 0;
            let calories = 0;
            let workoutCount = 0;
            
            week.days.forEach(day => {
                if (!day.completed) return;
                swimDist += day.swim?.distance || 0;
                swimTime += day.swim?.time || 0;
                bikeDist += day.bike?.distance || 0;
                bikeTime += day.bike?.time || 0;
                runDist += day.run?.distance || 0;
                runTime += day.run?.time || 0;
                calories += day.calories || 0;

                // Count each distinct activity individually
                workoutCount += day.workouts || 0;
            });
            
            return {
                swim: { dist: swimDist.toFixed(1), time: swimTime },
                bike: { dist: bikeDist.toFixed(1), time: bikeTime },
                run: { dist: runDist.toFixed(1), time: runTime },
                total: swimTime + bikeTime + runTime,
                calories,
                workoutCount
            };
        }
        
        // Calculate overall metrics
        function calculateOverallMetrics() {
            let swimDist = 0, swimTime = 0;
            let bikeDist = 0, bikeTime = 0;
            let runDist = 0, runTime = 0;
            let calories = 0;
            
            trainingData.weeks.forEach(week => {
                week.days.forEach(day => {
                    if (!day.completed) return;
                    swimDist += day.swim?.distance || 0;
                    swimTime += day.swim?.time || 0;
                    bikeDist += day.bike?.distance || 0;
                    bikeTime += day.bike?.time || 0;
                    runDist += day.run?.distance || 0;
                    runTime += day.run?.time || 0;
                    calories += day.calories || 0;
                });
            });
            
            const totalTime = swimTime + bikeTime + runTime;
            const hours = Math.floor(totalTime / 60);
            const mins = totalTime % 60;
            
            return {
                swim: { dist: swimDist.toFixed(1), time: swimTime },
                bike: { dist: bikeDist.toFixed(1), time: bikeTime },
                run: { dist: runDist.toFixed(1), time: runTime },
                total: totalTime,
                totalFormatted: `${hours}h ${mins}min`,
                calories
            };
        }

        function renderOverallSummary() {
            const m = calculateOverallMetrics();
            document.getElementById('overall-metrics-container').innerHTML = `

        // Generate splits HTML
        function generateSplitsHTML(day, dayId) {
            if (!day.completed || !day.splits) return '';
            
            let html = `<div class="splits-toggle" onclick="toggleSplits('${dayId}')">📊 View Splits ▼</div>`;
            html += `<div id="${dayId}-splits" class="splits-content"><div style="margin-top: 15px; padding: 12px; background: #f7fafc; border-radius: 6px;">`;
            
            // Swim splits
            if (day.splits.swim) {
                const s = day.splits.swim;
                if (s.setBreakdown) {
                    html += '<table class="splits-table"><thead><tr><th>Set</th><th>Distance</th><th>Time</th></tr></thead><tbody>';
                    s.setBreakdown.forEach((set, i) => {
                        html += `<tr><td class="split-number">#${i+1}</td><td>${set}</td><td class="split-time">${s.setTimes[i]}</td></tr>`;
                    });
                    html += '</tbody></table>';
                }
                if (s.lapTimes) {
                    html += `<div style="margin-top: 12px; font-size: 0.85em; color: #718096;">Lap Times (${s.lapLength}):</div><div class="swim-splits-grid">`;
                    s.lapTimes.forEach((time, i) => {
                        const strokes = s.lapStrokes?.[i] ? ` (${s.lapStrokes[i]})` : '';
                        html += `<div class="lap-time">${time}${strokes}</div>`;
                    });
                    html += '</div>';
                }
            }
            
            // Run splits
            if (day.splits.run) {
                const r = day.splits.run;
                html += '<table class="splits-table"><thead><tr><th>Km</th><th>Split</th><th>HR</th></tr></thead><tbody>';
                r.kmSplits.forEach((split, i) => {
                    html += `<tr><td class="split-number">${i+1}km</td><td class="split-time">${split}</td><td class="split-hr">${r.kmSplitHR[i]}</td></tr>`;
                });
                html += `</tbody></table><div style="margin-top: 8px; font-size: 0.9em; color: #4a5568;"><strong>Avg Pace:</strong> ${r.avgPace}</div>`;
            }
            
            // Bike splits
            if (day.splits.bike) {
                const b = day.splits.bike;
                html += `<div style="font-size: 0.9em; color: #4a5568;"><strong>Avg HR:</strong> ${b.avgHR} &nbsp; <strong>Max HR:</strong> ${b.maxHR}</div>`;
            }
            
            html += '</div></div>';
            return html;
        }
        
        // Toggle splits
        function toggleSplits(dayId) {
            document.getElementById(`${dayId}-splits`).classList.toggle('expanded');
        }
        
        // Toggle week
        function toggleWeek(weekNum) {
            const content = document.getElementById(`week-content-${weekNum}`);
            const icon = document.getElementById(`week-icon-${weekNum}`);
            content.classList.toggle('collapsed');
            icon.classList.toggle('collapsed');
        }
        
        // Jump to today's workout  
        function jumpToToday() {
            // Always use EST (UTC-5)
            const today = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            const dayName = days[today.getDay()];
            const month = months[today.getMonth()];
            const date = today.getDate();
            const todayStr = `${dayName}, ${month} ${date}`;
            
            // Find the day card with matching data-date
            const targetDay = document.querySelector(`.day[data-date="${todayStr}"]`);
            
            if (targetDay) {
                // Find and expand the week if collapsed
                const weekContent = targetDay.closest('.week-content');
                if (weekContent && weekContent.classList.contains('collapsed')) {
                    const weekNum = weekContent.id.match(/week-content-(\d+)/)[1];
                    toggleWeek(parseInt(weekNum));
                }
                
                // Scroll to the day
                setTimeout(() => {
                    targetDay.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    // Highlight briefly
                    targetDay.style.boxShadow = '0 0 20px rgba(72, 187, 120, 0.5)';
                    setTimeout(() => {
                        targetDay.style.boxShadow = '';
                    }, 2000);
                }, 300);
            } else {
                alert(`Today's workout (${todayStr}) not found in the plan!`);
            }
        }

            trainingData.weeks.forEach((week, idx) => {
                const isComplete = week.days.every(d => d.completed);
                const isCurrent = idx === currentWeekIndex;
                const shouldCollapse = idx < currentWeekIndex;
                const metrics = calculateWeekMetrics(week);
                
                let weekHTML = `
                    <div class="week-section">
                        <div class="week-header ${isComplete ? 'completed' : ''}" onclick="toggleWeek(${week.weekNumber})">
                            <span>Week ${week.weekNumber} (${week.dateRange})${isCurrent ? ' 📌 CURRENT' : ''}${isComplete ? ' ✅ COMPLETE' : ''}</span>
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <span style="font-size: 0.8em; font-weight: normal;">${week.focus}</span>
                                <span id="week-icon-${week.weekNumber}" class="collapse-icon ${shouldCollapse ? 'collapsed' : ''}">▼</span>
                            </div>
                        </div>
                        <div id="week-content-${week.weekNumber}" class="week-content ${shouldCollapse ? 'collapsed' : ''}">
                            <div class="week-metrics-compact ${isComplete ? 'completed-bg' : ''}">
                                <div class="compact-metric">
                                    <span>🏊</span>
                                    <span class="compact-metric-value compact-swim">${metrics.swim.dist}km</span>
                                    <span style="color: #718096;">${metrics.swim.time}min</span>
                                </div>
                                <div class="compact-metric">
                                    <span>🚴</span>
                                    <span class="compact-metric-value compact-bike">${metrics.bike.dist}km</span>
                                    <span style="color: #718096;">${metrics.bike.time}min</span>
                                </div>
                                <div class="compact-metric">
                                    <span>🏃</span>
                                    <span class="compact-metric-value compact-run">${metrics.run.dist}km</span>
                                    <span style="color: #718096;">${metrics.run.time}min</span>
                                </div>
                                <div class="compact-metric compact-total">
                                    <span>⏱️</span>
                                    <span class="compact-metric-value">${metrics.total}min</span>
                                    ${metrics.calories > 0 ? `<span style="color: #718096;">| 🔥 ${metrics.calories}cal</span>` : ''}
                                    <span style="color: #718096;">| 💪 ${metrics.workoutCount} workouts</span>
                                </div>
                            </div>
                            <div class="week-metrics ${isComplete ? 'completed-bg' : ''}">
                                <div class="metrics-grid">
                                    <div class="metric-card">
                                        <div class="metric-label">🏊 SWIM</div>
                                        <div class="metric-value swim">${metrics.swim.dist} km</div>
                                        <div class="metric-subvalue">${metrics.swim.time} min</div>
                                    </div>
                                    <div class="metric-card">
                                        <div class="metric-label">🚴 BIKE</div>
                                        <div class="metric-value bike">${metrics.bike.dist} km</div>
                                        <div class="metric-subvalue">${metrics.bike.time} min</div>
                                    </div>
                                    <div class="metric-card">
                                        <div class="metric-label">🏃 RUN</div>
                                        <div class="metric-value run">${metrics.run.dist} km</div>
                                        <div class="metric-subvalue">${metrics.run.time} min</div>
                                    </div>
                                </div>
                                <div class="metrics-total">
                                    <strong>Total:</strong> ${metrics.total} min &nbsp;|&nbsp; 💪 <strong>${metrics.workoutCount} workouts</strong>${metrics.calories > 0 ? ` &nbsp;|&nbsp; 🔥 <strong>${metrics.calories} cal</strong>` : ''}
                                </div>
                            </div>
                `;
                
                week.days.forEach((day, dayIdx) => {
                    const dayId = `w${week.weekNumber}d${dayIdx}`;
                    const splitsHTML = generateSplitsHTML(day, dayId);
                    
                    weekHTML += `
                        <div class="day ${day.completed ? 'completed' : ''}" data-date="${day.date}">
                            <div class="day-header">
                                <span class="day-name">${day.date}${day.completed ? ' ✅' : ''}</span>
                                <span class="day-type ${day.type}">${day.type}</span>
                            </div>
                            <div class="session-title">${day.title}</div>
                            <div class="session-details">${day.details}</div>
                            ${day.notes ? `<div class="notes">${day.notes}</div>` : ''}
                            ${splitsHTML}
                        </div>
                    `;
                });
                
                weekHTML += '</div></div>';
                container.innerHTML += weekHTML;
            });
        }
        
        // Initialize
        updateWeeksToRace();
        renderOverallSummary();
        renderWeeks();
    </script>
</body>
</html>
